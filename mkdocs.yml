site_name: 小组讨论知识库
site_description: 小组讨论录音整理 — 计算机网络 + 宇宙学
site_author: 余川
site_url: https://xz-freshman.github.io/group-discussion-wiki/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - 首页: index.md
  - 摘要:
    - summaries/index.md
    - 第七周讨论: summaries/第七周讨论.md
  - 概念:
    - concepts/index.md
    - 计算机网络基础: concepts/计算机网络基础.md
    - 可观测宇宙的膨胀历史: concepts/可观测宇宙的膨胀历史.md
    - FRW 度规与宇宙学方程: concepts/FRW 度规与宇宙学方程.md
    - 哈勃常数与 Hubble Tension: concepts/哈勃常数与 Hubble Tension.md
  - Q&A:
    - qa/index.md
    - Q&A 摘录: qa/Q&A 摘录.md
  - 操作指南:
    - UPDATE.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.mark
  - tables
  - attr_list
  - admonition
  - abbr